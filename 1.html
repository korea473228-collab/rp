<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특임대 직급표</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-base: #020202;
            --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            --avatar-icon-color: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; font-family: var(--font-main); -webkit-font-smoothing: antialiased; }
        body { margin: 0; min-height: 100vh; background: var(--bg-base); color: #fff; padding: 100px 20px; display: flex; justify-content: center; }
        
        .container { max-width: 1000px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .header { margin-bottom: 90px; text-align: center; }
        .header h1 { 
            font-size: 38px; 
            font-weight: 800; 
            letter-spacing: -0.04em;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .header h1::before, .header h1::after {
            content: "";
            display: block;
            width: 40px;
            height: 1px;
            background: linear-gradient(to var(--dir, right), rgba(255,255,255,0.4), transparent);
        }
        .header h1::before { --dir: left; border-left: 4px solid #fff; padding-left: 10px; }
        .header h1::after { --dir: right; border-right: 4px solid #fff; padding-right: 10px; }

        .group-section { 
            width: 100%; margin-bottom: 100px; padding: 40px; border-radius: 40px;
            background: radial-gradient(circle at top left, var(--group-color-low), transparent 400px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .group-title { 
            font-size: 14px; font-weight: 900; color: var(--group-color); text-transform: uppercase; 
            letter-spacing: 0.3em; margin-bottom: 50px; display: flex; align-items: center; 
            justify-content: center; gap: 25px; text-align: center;
        }
        .group-title::before, .group-title::after { content: ""; flex: 1; height: 1px; opacity: 0.25; }
        .group-title::before { background: linear-gradient(to left, var(--group-color), transparent); }
        .group-title::after { background: linear-gradient(to right, var(--group-color), transparent); }

        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
        
        .card { 
            width: 190px; padding: 35px 20px; background: rgba(255, 255, 255, 0.02); 
            border-radius: 32px; text-align: center; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); 
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; 
        }
        .card:hover { 
            transform: translateY(-10px); background: rgba(255, 255, 255, 0.05); 
            border-color: var(--group-color); box-shadow: 0 15px 35px -10px var(--group-color-low);
        }
        
        .avatar-box, .modal-avatar { 
            position: relative; margin: 0 auto; background-size: cover; background-position: center; 
            background-repeat: no-repeat; background-color: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .avatar-box { width: 70px; height: 70px; border-radius: 24px; margin-bottom: 22px; border: 2px solid var(--group-color); }
        .modal-avatar { width: 110px; height: 110px; border-radius: 38px; margin-bottom: 25px; border: 3px solid var(--group-color); }
        svg.default-profile { width: 50%; height: 50%; fill: var(--avatar-icon-color); }

        .id-badge { 
            font-size: 10px; 
            font-weight: 700; 
            color: rgba(255, 255, 255, 0.6); 
            padding: 4px 12px; 
            border-radius: 50px; 
            background: var(--group-color-alpha);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: inline-block; 
            margin-bottom: 12px; 
            border: 1px solid var(--group-color-border);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2); 
            letter-spacing: 0.02em;
        }

        .info b { display: block; font-size: 17px; margin-bottom: 8px; color: #fff; font-weight: 700; letter-spacing: -0.02em; }
        .info p { font-size: 11px; color: rgba(255, 255, 255, 0.4); line-height: 1.5; word-break: keep-all; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(30px); display: none; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: 0.4s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card { background: rgba(15, 15, 15, 0.8); width: 90%; max-width: 380px; border-radius: 45px; padding: 60px 30px 40px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; }
        .modal-name { font-size: 28px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.03em; }
        .modal-role { font-size: 12px; font-weight: 700; padding: 7px 18px; border-radius: 50px; background: rgba(255,255,255,0.05); display: inline-block; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .modal-desc { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.6); margin-bottom: 35px; }

        .dm-button { display: flex; align-items: center; justify-content: center; background: #5865F2; color: #fff; border: none; width: 100%; padding: 18px; border-radius: 22px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; font-family: var(--font-main); }
        .close-btn { position: absolute; top: 30px; right: 30px; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🛡️ 특임대 직급표 🛡️</h1></div>
        <div id="orgContent"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-card" id="mCard" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="mAvatar" class="modal-avatar"></div>
            <div id="mName" class="modal-name"></div>
            <div id="mRole" class="modal-role"></div>
            <div id="mBadgeContainer"></div>
            <p id="mDesc" class="modal-desc"></p>
            <button id="mDmBtn" class="dm-button">Discord 이동하기</button>
        </div>
    </div>

    <script>
        const _u = "aHR0cHM6Ly9oaWFjdXB0cmlnc25zdHloamFmbC5zdXBhYmFzZS5jbw==";
        const _k = "ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW1ocFlXTjFjSFJ5YVdkemJuTjBlV2hxWVdac0lpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTnpVMk5UTTBOellzSW1WNGNDSTZNakE1TVRJeU9UUTNObjAuM081Q2JDU01UeTFNQnFGYUVOQTFScno3V3g0UHNmSmtQM3B2Rk9QWld4UQ==";
        const sb = supabase.createClient(atob(_u), atob(_k));

        const ROLES = [
            { name: "특임대 사령관", color: "#FF3B30", glow: "rgba(255, 59, 48, 0.15)", alpha: "rgba(255, 59, 48, 0.1)", border: "rgba(255, 59, 48, 0.3)" },
            { name: "특임대 부사령관", color: "#AF52DE", glow: "rgba(175, 82, 222, 0.15)", alpha: "rgba(175, 82, 222, 0.1)", border: "rgba(175, 82, 222, 0.3)" },
            { name: "특임대 팀장", color: "#34C759", glow: "rgba(52, 199, 89, 0.15)", alpha: "rgba(52, 199, 89, 0.1)", border: "rgba(52, 199, 89, 0.3)" },
            { name: "특임대 팀원", color: "#007AFF", glow: "rgba(0, 122, 255, 0.15)", alpha: "rgba(0, 122, 255, 0.1)", border: "rgba(0, 122, 255, 0.3)" },
            { name: "특임대 수습", color: "#8E8E93", glow: "rgba(142, 142, 147, 0.15)", alpha: "rgba(142, 142, 147, 0.1)", border: "rgba(142, 142, 147, 0.3)" }
        ];

        const DEFAULT_SVG = `<svg class="default-profile" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

        async function fetchAll() {
            const { data, error } = await sb.from('org_members').select('*').order('rank', { ascending: true });
            if (!error) render(data);
        }

        function applyAvatar(el, url) {
            el.style.backgroundImage = 'none'; el.innerHTML = '';
            if (url) {
                const img = new Image(); img.src = url;
                img.onload = () => el.style.backgroundImage = `url('${url}')`;
                img.onerror = () => el.innerHTML = DEFAULT_SVG;
            } else { el.innerHTML = DEFAULT_SVG; }
        }

        function openModal(member, roleObj) {
            const overlay = document.getElementById('modalOverlay');
            const mAvat = document.getElementById('mAvatar');
            const mRole = document.getElementById('mRole');
            const mBadgeCont = document.getElementById('mBadgeContainer');
            
            mAvat.style.borderColor = roleObj.color;
            applyAvatar(mAvat, member.url);
            document.getElementById('mName').innerText = member.name;
            mRole.innerText = member.role;
            mRole.style.color = roleObj.color;
            mRole.style.borderColor = roleObj.color + '40';

            mBadgeCont.innerHTML = `<span class="id-badge" style="--group-color-alpha: ${roleObj.alpha}; --group-color-border: ${roleObj.border};">고유번호 ${member.id}</span>`;
            
            document.getElementById('mDesc').innerText = member.s || "소개글이 없습니다.";
            document.getElementById('mDmBtn').onclick = () => {
                if (!member.discord_id) return alert("ID가 없습니다.");
                window.location.href = `discord://-/users/${member.discord_id}`;
            };
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function render(data) {
            const container = document.getElementById('orgContent');
            container.innerHTML = '';
            ROLES.forEach((roleObj) => {
                const members = data.filter(m => m.role === roleObj.name);
                if (members.length === 0) return;
                const section = document.createElement('div');
                section.className = 'group-section';
                section.style.setProperty('--group-color', roleObj.color);
                section.style.setProperty('--group-color-low', roleObj.glow);
                section.style.setProperty('--group-color-alpha', roleObj.alpha);
                section.style.setProperty('--group-color-border', roleObj.border);
                section.innerHTML = `<div class="group-title">${roleObj.name}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                members.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openModal(m, roleObj);
                    const avBox = document.createElement('div');
                    avBox.className = 'avatar-box';
                    applyAvatar(avBox, m.url);
                    card.appendChild(avBox);
                    const info = document.createElement('div');
                    info.className = 'info';
                    info.innerHTML = `<b>${m.name}</b><span class="id-badge">${m.id}</span><p>${m.s || ''}</p>`;
                    card.appendChild(info);
                    grid.appendChild(card);
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }
        fetchAll();
    </script>
</body>
</html>
